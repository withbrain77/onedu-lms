{% load admin_dashboard %}
{% onedu_admin_dashboard as dashboard %}

<input class="onedu-admin-menu-toggle" id="oneduAdminMenuToggle" type="checkbox">
<label class="onedu-admin-menu-button" for="oneduAdminMenuToggle">관리 메뉴</label>

<aside class="onedu-admin-sidebar" aria-label="관리 메뉴">
  <div class="onedu-admin-sidebar__brand">
    <strong>ONEDU LMS</strong>
    <span>운영 콘솔</span>
  </div>

  <nav class="onedu-admin-menu">
    {% for section in dashboard.menu_sections %}
      <details class="onedu-admin-menu-section" {% if section.is_active or section.is_dashboard %}open{% endif %}>
        <summary>
          <span class="onedu-admin-menu-icon" aria-hidden="true">{{ section.icon }}</span>
          <span>{{ section.title }}</span>
        </summary>
        <ul>
          {% for item in section.items %}
            <li>
              <a class="{% if item.is_active %}is-active{% endif %}" href="{{ item.url }}" {% if item.is_active %}aria-current="page"{% endif %}>
                <span>{{ item.label }}</span>
              </a>
              {% if item.can_add %}
                <a class="onedu-admin-menu-add" href="{{ item.add_url }}" aria-label="{{ item.label }} 추가">+</a>
              {% endif %}
            </li>
          {% endfor %}
        </ul>
      </details>
    {% endfor %}
  </nav>
</aside>
