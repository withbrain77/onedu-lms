{% extends "admin/change_form.html" %}

{% block object-tools-items %}
  {{ block.super }}
  {% if original and not is_popup %}
    <li>
      <form method="post" action="{% url 'admin:lessons_lesson_queue_hls' original.pk %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="button">HLS 변환 요청</button>
      </form>
    </li>
    <li>
      <form method="post" action="{% url 'admin:lessons_lesson_queue_hls' original.pk %}" style="display:inline;">
        {% csrf_token %}
        <input type="hidden" name="force" value="1">
        <button type="submit" class="button">HLS 재변환</button>
      </form>
    </li>
    <li>
      <form method="post" action="{% url 'admin:lessons_lesson_queue_hls' original.pk %}" style="display:inline;">
        {% csrf_token %}
        <input type="hidden" name="force" value="1">
        <input type="hidden" name="transcode" value="1">
        <button type="submit" class="button">H.264/AAC 재변환</button>
      </form>
    </li>
  {% endif %}
{% endblock %}
