{% extends "base.html" %}

{% block title %}재설정 메일 발송 | Onedu LMS{% endblock %}

{% block page_header %}
<div class="page-header">
  <h1>메일을 확인해 주세요</h1>
  <p>입력한 이메일과 일치하는 계정이 있으면 비밀번호 재설정 링크가 발송됩니다.</p>
</div>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-9 col-lg-7 col-xl-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <div class="alert alert-info mb-4">
          메일이 보이지 않으면 스팸함을 확인해 주세요. 계속 도착하지 않으면 운영 문의로 연락해 주세요.
        </div>
        <div class="d-grid d-sm-flex gap-2">
          <a class="btn btn-primary" href="{% url 'accounts:login' %}">로그인으로 이동</a>
          <a class="btn btn-outline-secondary" href="{% url 'accounts:password_reset' %}">다시 요청</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
