{% extends "base.html" %}

{% block title %}시험 접근 제한 | Onedu LMS{% endblock %}

{% block page_header %}
<div class="page-header">
  <h1>{{ quiz.title }}</h1>
  <p>{{ course.title }}</p>
</div>
{% endblock %}

{% block content %}
<div class="empty-state">
  <h2>{{ access.message }}</h2>
  <p>시험은 승인된 수강 기간 안에서만 응시할 수 있습니다.</p>
  <div class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
    <a class="btn btn-primary" href="{% url 'enrollments:classroom' %}">내 강의실</a>
    <a class="btn btn-outline-secondary" href="{{ course.get_absolute_url }}">강의 상세</a>
  </div>
</div>
{% endblock %}
